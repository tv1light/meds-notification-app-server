spring:
  application:
    name: meds-notification-app-server

  datasource:
    url: jdbc:postgresql://localhost:5432/meds_notification
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    ru.tv1light.medsnotification: DEBUG
